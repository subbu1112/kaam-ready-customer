<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#F5C000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Kaam Ready" />
    <meta name="description" content="Instant skilled workers across Karnataka" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <title>Kaam Ready</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // One-time self-heal: clear any stale service worker + caches from older builds, then reload.
      (function () {
        var V = 'kr-2026-06-24';
        try {
          if (localStorage.getItem('kr_cache_ver') !== V) {
            localStorage.setItem('kr_cache_ver', V);
            var jobs = [];
            if ('serviceWorker' in navigator) {
              jobs.push(navigator.serviceWorker.getRegistrations().then(function (rs) {
                return Promise.all(rs.map(function (r) { return r.unregister(); }));
              }).catch(function () {}));
            }
            if (window.caches && caches.keys) {
              jobs.push(caches.keys().then(function (ks) {
                return Promise.all(ks.map(function (k) { return caches.delete(k); }));
              }).catch(function () {}));
            }
            Promise.all(jobs).then(function () { location.reload(); });
          }
        } catch (e) {}
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
